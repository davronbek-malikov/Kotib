<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#FFFFFF" />
    <title>Kotib — Aqlli shaxsiy kotib</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Caveat carries Latin Extended and Cyrillic, so Uzbek o'/g' and the
         Cyrillic locale both render in the handwriting font. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Caveat:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Applied before first paint so neither the theme nor the skin flashes
      // (plan.md §2.3). Mirrors what store.ts writes to kotib.theme/kotib.skin.
      (function () {
        try {
          var saved = localStorage.getItem('kotib.theme') || 'light';
          var dark =
            saved === 'dark' ||
            (saved === 'auto' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.setAttribute('data-theme', 'dark');
          var skin = localStorage.getItem('kotib.skin') || 'klassik';
          document.documentElement.setAttribute('data-skin', skin);
          var font = localStorage.getItem('kotib.font') || 'manrope';
          document.documentElement.setAttribute('data-font', font);
        } catch (e) {
          /* localStorage unavailable — fall through to the light defaults. */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
